<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLOUR-PALLETTE-GENERATOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Color Palette
        </button>
        <div class="pallete-container">

            <!--color-box 1--->

            <div class="color-box">
                <div class="color"  style="background-color: #f2545b;" ></div>
                <div class="color-info">   
                    <span class="hex-value">#F2545B</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard "></i>
                </div>
            </div>
            
            <!--color-box 2--->
            
            <div class="color-box">
                <div class="color"  style="background-color: #23CE6B;" ></div>
                <div class="color-info">   
                    <span class="hex-value">#23CE6B</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard "></i>
                </div>
            </div>
            
            <!--color-box 3--->
            
            <div class="color-box">
                <div class="color"  style="background-color: #20063B;" ></div>
                <div class="color-info">  
                    <span class="hex-value">#20063B</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard "></i>
                </div>
            </div>
            
            <!--color-box 4--->
            
            <div class="color-box">
                <div class="color"  style="background-color: #CC3363;" ></div>
                <div class="color-info">
                    <span class="hex-value">#CC3363</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard "></i>
                </div>
            </div>
            
            <!--color-box 5--->
            
            <div class="color-box">
                <div class="color"  style="background-color: #FE5F55;" ></div>
                <div class="color-info">
                    <span class="hex-value">#FE5F55</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard "></i>
                </div>
            </div>

        </div>
    </div>
   <script src="script.js"></script>
</body>
</html>
