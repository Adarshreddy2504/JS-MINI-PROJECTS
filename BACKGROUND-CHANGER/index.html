<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Background Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <h1>Background-Changer</h1>
        <p>Click any color to change the background</p>
    </header>

    <main class="palette-grid">
        <div id="red" class="box">Red</div>
        <div id="blue" class="box">Blue</div>
        <div id="orange" class="box">Orange</div>
        <div id="green" class="box">Green</div>
        <div id="pink" class="box">Pink</div>
        <div id="purple" class="box">Purple</div>
        <div id="yellow" class="box">Yellow</div>
        <div id="violet" class="box">Violet</div>
        <div id="teal" class="box">Teal</div>
        <div id="coral" class="box">Coral</div>
        <div id="lavender" class="box">Lavender</div>
        <div id="indigo" class="box">Indigo</div>
        <div id="mint" class="box">Mint</div>
        <div id="plum" class="box">Plum</div>
        <div id="peach" class="box">Peach</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
