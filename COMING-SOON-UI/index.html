<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comig Soon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <span>Astra</span>
        </div>

        <section class="hero">
            <div class="badge">
                <span class="pulse"></span>
                Coming Soon
            </div>

            <h1>Something remarkable is on its way.</h1>
            <p>We're preparing an experience designed with innovation, simplicity, and performance at its core.</p>
        </section>

        <section class="countdown">
            <div class="time-block">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>

            <span class="seperator">:</span>

            <div class="time-block">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>

            <span class="seperator">:</span>

            <div class="time-block">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>

            <span class="seperator">:</span>

            <div class="time-block">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </section>

        <form class="email-form" id="email-form">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" required placeholder="Enter your email">
            </div>

            <button type="submit">Notify Me <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <div class="success-message hidden" id="success">
            <i class="fa-solid fa-circle-check"></i>
            <span>Thank you! We'll send you an update as soon as we're ready.</span>
        </div>

        <div class="socials">
            <a href="https://x.com/AdarshR55297580" target="_blank">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            <a href="https://www.instagram.com/adarsh2801m/" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.linkedin.com/in/adarsh-reddy-12367941a/" target="_blank">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
